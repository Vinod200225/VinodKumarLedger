name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_PUBLIC_SHEET_ID: ${{ secrets.VITE_PUBLIC_SHEET_ID }}
          VITE_REAL_SHEET_ID: ${{ secrets.VITE_REAL_SHEET_ID }}
          VITE_PUBLIC_SHEET_API_KEY: ${{ secrets.VITE_PUBLIC_SHEET_API_KEY }}
          VITE_REAL_SHEET_API_KEY: ${{ secrets.VITE_REAL_SHEET_API_KEY }}
          VITE_PUBLIC_SHEETS_WEBHOOK: ${{ secrets.VITE_PUBLIC_SHEETS_WEBHOOK }}
          VITE_REAL_SHEETS_WEBHOOK: ${{ secrets.VITE_REAL_SHEETS_WEBHOOK }}
          VITE_SHEETS_WEBHOOK_SECRET: ${{ secrets.VITE_SHEETS_WEBHOOK_SECRET }}
          VITE_PUBLIC_PASSWORD_HASH: ${{ secrets.VITE_PUBLIC_PASSWORD_HASH }}
          VITE_REAL_PASSWORD_HASH: ${{ secrets.VITE_REAL_PASSWORD_HASH }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
